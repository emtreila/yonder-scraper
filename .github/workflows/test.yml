name: Automation Tests

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no deletions)'
        required: true
        default: 'true'

jobs:
  validate-jobs:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Validate and remove expired jobs
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "Schedule trigger — running LIVE mode..."
            node --no-deprecation tests/validate-yonder-jobs.js --delete
          elif [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "Running in DRY RUN mode..."
            node --no-deprecation tests/validate-yonder-jobs.js --dry-run
          else
            echo "Running in LIVE mode (will delete expired jobs)..."
            node --no-deprecation tests/validate-yonder-jobs.js --delete
          fi
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

  ensure-company-core:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: node company.js
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

  automation-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Run Integration Tests
        run: npm run test:integration
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-report
          path: test-report.html
