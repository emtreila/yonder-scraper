name: Scrape Yonder Jobs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run scrape
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jobs.json
          path: jobs.json
